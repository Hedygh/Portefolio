<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard — OG Game Challenge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/leaderboard.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar__logo">
      <span class="navbar__logo-og">OG</span>
      <span class="navbar__logo-sub">CHALLENGE</span>
    </div>
    <ul class="navbar__links">
      <li><a href="index.html" class="navbar__link">HOME</a></li>
      <li><a href="games.html" class="navbar__link">CHALLENGES</a></li>
      <li><a href="leaderboard.html" class="navbar__link navbar__link--active">LEADERBOARD</a></li>
    </ul>
    <div id="authArea"></div>
  </nav>

  <!-- LEADERBOARD -->
  <main class="leaderboard">

    <span class="hud-corner hud-corner--tl"></span>
    <span class="hud-corner hud-corner--tr"></span>
    <span class="hud-corner hud-corner--bl"></span>
    <span class="hud-corner hud-corner--br"></span>

    <div class="leaderboard__header">
      <h1 class="leaderboard__title">LEADER<span>BOARD</span></h1>
      <p class="leaderboard__sub">THE LEGENDS WHO MADE HISTORY</p>
    </div>

    <!-- Sélecteur de jeu -->
    <div class="leaderboard__tabs" id="gameTabs"></div>

    <!-- Tableau -->
    <div class="leaderboard__card">
      <div class="leaderboard__row leaderboard__row--head">
        <span class="col-rank">RANK</span>
        <span class="col-player">PLAYER</span>
        <span class="col-score">SCORE</span>
      </div>
      <div id="leaderboardBody"></div>
    </div>

    <!-- Rang du joueur -->
    <div class="leaderboard__you" id="playerRank"></div>

  </main>
  <script src="../js/api.js"></script>
  <script src="../js/session.js"></script>
  <script src="../js/leaderboard.js"></script>
</body>
</html>
