<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — OG Game Challenge</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/register.css" />
</head>
<body>

  <nav class="navbar">
    <div class="navbar__logo">
      <span class="navbar__logo-og">OG</span>
      <span class="navbar__logo-sub">CHALLENGE</span>
    </div>

    <ul class="navbar__links">
      <li><a href="index.html" class="navbar__link">HOME</a></li>
      <li><a href="games.html" class="navbar__link">CHALLENGES</a></li>
      <li><a href="leaderboard.html" class="navbar__link">LEADERBOARD</a></li>
    </ul>

    <div id="authArea"></div>
  </nav>

  <main class="register">
    <span class="hud-corner hud-corner--tl"></span>
    <span class="hud-corner hud-corner--tr"></span>
    <span class="hud-corner hud-corner--bl"></span>
    <span class="hud-corner hud-corner--br"></span>

    <div class="register__card">
      <div class="register__header">
        <h1 class="register__title">WELCOME<br><span>BACK</span></h1>
        <p class="register__sub">LOGIN TO YOUR PLAYER ACCOUNT</p>
      </div>

      <div class="register__form">
        <div class="form-group">
          <label class="form-label" for="username">USERNAME</label>
          <input
            class="form-input"
            type="text"
            id="username"
            name="username"
            placeholder="ENTER YOUR USERNAME"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">PASSWORD</label>
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            placeholder="ENTER YOUR PASSWORD"
          />
        </div>

        <p class="register__message" id="loginMessage"></p>

        <button class="btn-submit" id="loginBtn">
          LOGIN <span>→</span>
        </button>

        <p class="register__login-link">
          NEW CHALLENGER ? <a href="register.html">REGISTER HERE</a>
        </p>
      </div>
    </div>
  </main>

  <script src="../js/api.js"></script>
  <script src="../js/session.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
